<div class="page-wrapper">
  <main class="login-container">
    <section class="left-panel">
      <div class="content">
        <h1>Bienvenido al panel</h1>
        <p>Gestiona usuarios, datos y operaciones desde un solo lugar.</p>
      </div>
    </section>

    <section class="right-panel">
      <div class="form-box">
        <div class="form-header">
          <h2>Smart Trash Routes</h2>
          <h3>Accede a tu cuenta</h3>
        </div>

        <form (ngSubmit)="onSubmit()">
          <div class="input-group">
            <label for="user">Correo o usuario</label>
            <input type="text" id="user" name="user" [(ngModel)]="identifier" required>
          </div>

          <div class="input-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" [(ngModel)]="password" required>
          </div>

          <p class="forgot-password">
            Olvidaste tu contraseña, <a href="#">Haz clic aquí</a>
          </p>

          <button type="submit" class="btn-login">Iniciar sesión</button>
        </form>
      </div>
    </section>
  </main>

  <app-footer />
</div>
