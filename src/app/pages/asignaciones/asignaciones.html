<div class="admin-card">
  <div class="view-header">
    <h1>Asignaciones de Servicio</h1>
    <button class="btn btn-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
      Nueva Asignación
    </button>
  </div>

  <div class="assignments-list">
    
    <!-- Ejemplo de tarjeta de asignación estática -->
    <div class="assignment-item">
      <div class="assignment-header">
        <div class="assignment-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-dark); margin-right: 8px; vertical-align: bottom;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
          Sector Norte - Zona 1
        </div>
        <span class="badge badge-en_ruta">En Curso</span>
      </div>

      <div class="assignment-body">
        <div class="vehicle-assigned">
          <div class="label">Vehículo Asignado</div>
          <div class="vehicle-display">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--secondary-teal);"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 22 17 7 12 2 7 7 7 22"></polyline></svg>
            <div class="vehicle-details">
              <strong>ABC-1234</strong>
              <span>Volvo FMX</span>
            </div>
          </div>
        </div>

        <div class="crew-assigned">
          <div class="label">Tripulación</div>
          <div class="crew-list">
            <div class="crew-member">
              <div class="avatar">JP</div>
              <span>Juan Pérez (Driver)</span>
            </div>
            <div class="crew-member">
              <div class="avatar">MR</div>
              <span>María Ruiz (Recolector)</span>
            </div>
          </div>
        </div>
      </div>
      
      <div class="assignment-footer">
        <span class="text-muted">Asignación #1024</span>
        <div class="actions">
          <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 13px;">Finalizar</button>
        </div>
      </div>
    </div>

  </div>
</div>
