<div class="admin-card">
  <div class="view-header">
    <h1>Reportes de Incidencias</h1>
    <button class="btn btn-secondary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
      Exportar PDF
    </button>
  </div>

  <div class="data-table">
    <div class="data-table-header reports-grid">
      <div>Asunto</div>
      <div>Comentario</div>
      <div>Severidad</div>
      <div>Fecha</div>
      <div>Acciones</div>
    </div>
    
    <!-- Fila estática -->
    <div class="data-table-row reports-grid">
      <div class="report-asunto">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--status-orange); margin-right: 8px; vertical-align: sub;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        Falla de motor
      </div>
      <div class="report-comentario">
        Ruido inusual en el vehículo Volvo FMX...
      </div>
      <div>
        <span class="badge badge-alta">Alta</span>
      </div>
      <div class="report-fecha">
        15 Abr 2026, 08:30
      </div>
      <div class="actions">
        <button class="btn-icon view-btn" title="Ver Detalles">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--status-blue);"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </button>
      </div>
    </div>

    <!-- Otra Fila estática -->
    <div class="data-table-row reports-grid">
      <div class="report-asunto">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--status-blue); margin-right: 8px; vertical-align: sub;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        Incidencia Menor
      </div>
      <div class="report-comentario">
        Retraso por tráfico pesado en la Zona 1.
      </div>
      <div>
        <span class="badge badge-baja">Baja</span>
      </div>
      <div class="report-fecha">
        16 Abr 2026, 14:10
      </div>
      <div class="actions">
        <button class="btn-icon view-btn" title="Ver Detalles">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--status-blue);"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </button>
      </div>
    </div>

  </div>
</div>
