<div class="admin-card">
  <div class="view-header">
    <h1>Flota de Vehículos</h1>
    <button class="btn btn-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
      Agregar Vehículo
    </button>
  </div>

  <div class="data-table">
    <div class="data-table-header vehicles-grid">
      <div>Placa</div>
      <div>Modelo</div>
      <div>Capacidad (m³)</div>
      <div>Estado</div>
      <div>Acciones</div>
    </div>
    
    <!-- Ejemplo de fila estática (El *ngFor iterará sobre esto) -->
    <div class="data-table-row vehicles-grid">
      <div class="vehicle-plate">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-dark); margin-right: 8px; vertical-align: sub;"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 22 17 7 12 2 7 7 7 22"></polyline></svg>
        ABC-1234
      </div>
      <div class="vehicle-model">Volvo FMX 460</div>
      <div class="vehicle-capacity">20 m³</div>
      <div>
        <span class="badge badge-success">Disponible</span>
      </div>
      <div class="actions">
        <button class="btn-icon edit-btn" title="Editar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        </button>
        <button class="btn-icon delete-btn" title="Eliminar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        </button>
      </div>
    </div>
  </div>
</div>
