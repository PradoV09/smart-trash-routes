<div class="admin-card">
  <div class="view-header">
    <h1>Flota de Vehículos</h1>
    <button class="btn btn-primary" (click)="openCreateForm()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
      Agregar Vehículo
    </button>
  </div>

  <div class="crud-form" *ngIf="showForm">
    <input
      class="form-input"
      [ngModel]="formData.placa"
      (ngModelChange)="onPlacaChange($event)"
      placeholder="Placa (ABC123)"
      maxlength="6"
    />
    <input
      class="form-input"
      [(ngModel)]="formData.modelo"
      placeholder="Modelo (opcional, max 50)"
      maxlength="50"
    />
    <input
      class="form-input"
      type="text"
      inputmode="decimal"
      [(ngModel)]="formData.capacidad_m3"
      placeholder="Capacidad m³ (opcional, ej. 8.5)"
    />
    <select class="form-input" [(ngModel)]="formData.estado">
      <option value="disponible">disponible</option>
      <option value="en_ruta">en_ruta</option>
      <option value="mantenimiento">mantenimiento</option>
      <option value="inactivo">inactivo</option>
    </select>
    <div class="button-group">
      <button class="btn btn-primary" (click)="saveVehiculo()" [disabled]="saving()">
        {{ editingId ? 'Actualizar' : 'Crear' }}
      </button>
      <button class="btn btn-secondary" (click)="cancelForm()" [disabled]="saving()">Cancelar</button>
    </div>
  </div>

  <p class="table-message error" *ngIf="error()">{{ error() }}</p>
  <p class="table-message" *ngIf="loading()">Cargando vehículos...</p>

  <div class="data-table">
    <div class="data-table-header vehicles-grid">
      <div>Placa</div>
      <div>Modelo</div>
      <div>Capacidad (m³)</div>
      <div>Estado</div>
      <div>ID externo</div>
      <div>Acciones</div>
    </div>

    <div class="data-table-row vehicles-grid" *ngFor="let vehiculo of vehiculos()">
      <div class="vehicle-plate">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-dark); margin-right: 8px; vertical-align: sub;"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 22 17 7 12 2 7 7 7 22"></polyline></svg>
        {{ vehiculo.placa }}
      </div>
      <div class="vehicle-model">{{ vehiculo.modelo || '-' }}</div>
      <div class="vehicle-capacity">{{ formatCapacidad(vehiculo) }}</div>
      <div>
        <span class="badge" [ngClass]="getEstadoClass(vehiculo.estado)">{{ vehiculo.estado }}</span>
      </div>
      <div class="vehicle-external-id" [title]="vehiculo.id_externo || ''">
        {{ labelIdExterno(vehiculo) }}
      </div>
      <div class="actions">
        <button class="btn-icon edit-btn" title="Editar" (click)="openEditForm(vehiculo)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        </button>
        <button
          class="btn-icon delete-btn"
          title="Eliminar"
          (click)="deleteVehiculo(vehiculo)"
          [disabled]="deletingId() === vehiculo.id_vehiculo"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        </button>
      </div>
    </div>

    <p class="table-message" *ngIf="!loading() && vehiculos().length === 0">No hay vehículos registrados.</p>
  </div>
</div>
