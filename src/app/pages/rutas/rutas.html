<div class="rutas-layout">
  <!-- Panel Lateral Izquierdo: Lista de Rutas -->
  <app-sidebar-rutas class="sidebar-panel"></app-sidebar-rutas>

  <!-- Área Derecha: Mapa -->
  <div class="map-area">
    <!-- Panel Flotante para crear una ruta nueva -->
    <div class="floating-controls">
      <div class="control-card">
        <h3>Crear nueva ruta</h3>
        <p class="help-text">Haz clic en el mapa para marcar los puntos</p>
        
        <div class="input-row">
          <input type="text" [(ngModel)]="nombreRuta" placeholder="Nombre de la ruta..." class="form-input">
          <button class="btn btn-icon" title="Deshacer último punto" (click)="deshacerUltimoPunto()" [disabled]="routeCoords.length === 0">
            <mat-icon style="font-size: 20px; width: 20px; height: 20px;">undo</mat-icon>
          </button>
        </div>
        
        <div class="action-row" style="align-items: center; justify-content: space-between;">
          <span style="font-size: 0.8rem; color: var(--text-muted, #718096); font-weight: 500;">
            {{ routeCoords.length }} puntos
          </span>
          <div style="display: flex; gap: 8px;">
            <button class="btn btn-secondary" (click)="limpiarMapa()">Limpiar</button>
            <button class="btn btn-primary" (click)="guardarRuta()" [disabled]="routeCoords.length < 2 || saving">
              <span *ngIf="saving" class="loader-white"></span>
              <span *ngIf="!saving">Guardar Ruta</span>
            </button>
          </div>
        </div>
        
        <p class="table-message error" *ngIf="error" style="margin-top: 8px; font-size: 0.8rem;">{{ error }}</p>
      </div>
    </div>
    
    <!-- Contenedor Leaflet -->
    <div id="map" class="map-container"></div>
  </div>
</div>
